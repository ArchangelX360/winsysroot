name: CI and Release Binaries

on:
  pull_request:
  push:
  release:
    types:
      - created

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/winsysroot-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: winsysroot-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/winsysroot-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  attach-release-assets:
    name: Attach binaries to release
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/winsysroot-linux-amd64 \
            dist/winsysroot-linux-arm64 \
            dist/winsysroot-darwin-amd64 \
            dist/winsysroot-darwin-arm64 \
            dist/winsysroot-windows-amd64.exe \
            dist/winsysroot-windows-arm64.exe \
            --clobber
